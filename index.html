<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SlideGraph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style id="dynamic-styles">
        :root {
            --bg-color: #0d0d0d;
            --bar-time-color: #d83b01;
            --f2-bg: rgba(15, 15, 15, 0.98);
            --f2-card: #1f1f1f;
            --f2-txt: #e0e0e0;
            --f2-border: #333;
            --f2-input: #121212;
            --primary-accent: #00ff88;
        }

        
.light-theme {
    --f2-bg: #d7d7d7;
    --f2-card: #ececec;
    --f2-txt: #1f1f1f;
    --f2-border: #b9b9b9;
    --f2-input: #f4f4f4;
    --primary-accent: #008f44;
}


        /* RESET & BASE */
        body, html { 
            margin: 0; padding: 0; overflow: hidden; height: 100%; 
            background-color: var(--bg-color); 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            color: white; font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* COMPONENTES DA TELA DE EXIBIÇÃO (TV) */
        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 8px; background: rgba(255,255,255,0.05); z-index: 5000; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--bar-time-color); transform-origin: left; }
        
        .screen-container { 
            width: 100vw; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 40px; box-sizing: border-box; 
            opacity: 1; transition: opacity 0.5s ease-in-out;
        }
        
        #slide-title { 
            width: 100%; font-weight: 900; text-transform: uppercase; text-align: center; 
            margin-bottom: 30px; letter-spacing: 2px; flex-shrink: 0; 
            text-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        
        .slide-content { width: 95%; flex: 1; position: relative; display: flex; align-items: center; justify-content: center; min-height: 0; }
        
        #capa-content { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background-size: cover; background-position: center; z-index: 4000; }
        
        .stats-footer { font-weight: 900; font-size: 60px; text-align: center; margin-top: 20px; min-height: 70px; flex-shrink: 0; text-shadow: 0px 4px 10px rgba(0,0,0,0.4); }

        /* PAINEL F2 (MODERNIZADO) */
        

        
        .header-panel h2 { margin: 0; font-size: 28px; color: var(--primary-accent); }

        .card { background: var(--f2-card); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--f2-border); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* Controles do Card (Setas, Checkbox, Titulo) */
        .card-controls-left { display: flex; align-items: center; gap: 8px; flex: 1; }
        .btn-icon { background: var(--f2-input); color: var(--f2-txt); border: 1px solid var(--f2-border); border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-icon:hover { background: var(--primary-accent); color: #000; }
        .card-toggle { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary-accent); }

        input[type="text"], input[type="number"], textarea, input[type="color"] { 
            background: var(--f2-input); color: var(--f2-txt); border: 1px solid var(--f2-border); 
            padding: 10px 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-family: inherit;
        }
        input:focus, textarea:focus { outline: 1px solid var(--primary-accent); border-color: var(--primary-accent); }
        input[type="color"] { padding: 2px; cursor: pointer; height: 40px; }

        textarea.data-input { height: 180px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.4; resize: vertical; }

        .btn { padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-add { background: var(--primary-accent); color: #000; width: 100%; font-size: 16px; margin-bottom: 20px; text-shadow: 0 1px 2px rgba(255,255,255,0.3); }
        .btn-add:hover { filter: brightness(1.1); }
        
        .btn-rule { background: #3a3a3a; color: #fff; font-size: 12px; border: 1px solid #555; }
        .light-theme .btn-rule { background: #ecf0f1; color: #2c3e50; border-color: #bdc3c7; }
        
        .btn-remove { background: #e74c3c; color: white; padding: 6px 12px; font-size: 12px; }

        .btn-save-main { 
            background: var(--bar-time-color); color: white; padding: 20px; border-radius: 8px; 
            font-size: 20px; width: 100%; margin-top: 20px; box-shadow: 0 4px 0px rgba(0,0,0,0.3); text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-save-main:active { transform: translateY(4px); box-shadow: none; }

        /* MENU LATERAL DE CONFIGURAÇÕES */
        #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9499; backdrop-filter: blur(2px); }
        #sidebar-settings {
            position: fixed; top: 0; right: -450px; width: 400px; height: 100%;
            background: var(--f2-card); z-index: 9500; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5); padding: 25px; overflow-y: auto; 
            border-left: 1px solid var(--f2-border); color: var(--f2-txt); box-sizing: border-box;
        }
        #sidebar-settings.open { right: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--f2-border); padding-bottom: 10px; margin-bottom: 20px; }
        .sidebar-header h3 { margin: 0; font-size: 20px; color: var(--primary-accent); }
        .sidebar-section { margin-bottom: 25px; }
        .sidebar-section h4 { margin: 0 0 10px 0; font-size: 14px; opacity: 0.7; text-transform: uppercase; }
        .sidebar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .sidebar-grid label { font-size: 12px; font-weight: bold; display: block; margin-bottom: 4px; }

        /* MODAL DE REGRAS */
        #rule-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 500px; background: var(--f2-card); border: 2px solid var(--bar-time-color); 
            padding: 25px; z-index: 10000; border-radius: 12px; color: var(--f2-txt); box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }
        #rule-modal-backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; backdrop-filter: blur(3px); }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-weight: bold; }
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; }


        
.sticky-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 99999;
            background: var(--f2-bg);
            padding: 12px 24px;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--f2-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            box-sizing: border-box;
        }


        .card-header {
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-controls-left {
            min-width: 0;
            flex-wrap: wrap;
        }

        .visibility-btn {
            background: var(--f2-input);
            border: 1px solid var(--f2-border);
            color: var(--f2-txt);
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .visibility-btn.hidden {
            opacity: 0.5;
        }

        
        
.toggle-eye {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--f2-border);
            background: var(--f2-input);
            position: relative;
            cursor: pointer;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .toggle-eye::before {
            content: '◉';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            opacity: 0.35;
            transition: all 0.25s ease;
        }

        .toggle-eye.active::before {
            content: '◉';
            opacity: 1;
            color: var(--primary-accent);
        }

        .toggle-eye:not(.active)::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 2px;
            background: #ff4d4d;
            transform: rotate(-35deg);
            top: 15px;
            left: 7px;
            border-radius: 2px;
        }



        .chart-type-select {
            background: var(--f2-input);
            color: var(--f2-txt);
            border: 1px solid var(--f2-border);
            border-radius: 6px;
            padding: 8px;
        }

    
.card-controls-left {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.card-controls-left input[type="text"] {
    min-width: 0 !important;
}

.header-panel h2 {
    white-space: nowrap;
}

@media (max-width: 900px) {
    .sticky-header {
        flex-wrap: wrap;
        align-items: flex-start;
    }
}

}

@media (max-width:900px){

    }

}


/* =====================================================
   OLHO / OLHO CORTADO
===================================================== */

.eye-btn{
    width:34px;
    height:34px;
    border-radius:6px;
    border:1px solid var(--f2-border);
    background:var(--f2-input);
    position:relative;
    cursor:pointer;
    flex-shrink:0;
}

.eye-btn::before{
    content:'';
    position:absolute;
    inset:0;
    margin:auto;
    width:16px;
    height:10px;
    border:2px solid rgba(255,255,255,0.45);
    border-radius:12px;
    box-sizing:border-box;
}

.eye-btn::after{
    content:'';
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:rgba(255,255,255,0.45);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.eye-btn.active::before{
    border-color:var(--primary-accent);
}

.eye-btn.active::after{
    background:var(--primary-accent);
}

.eye-btn:not(.active) .slash{
    display:block;
}

.eye-btn:not(.active){
    opacity:0.7;
}

.eye-btn:not(.active){
    background:
    linear-gradient(
        -35deg,
        transparent 44%,
        #ff5d5d 44%,
        #ff5d5d 56%,
        transparent 56%
    ),
    var(--f2-input);
}

/* =====================================================
   CONTROLES COMPACTOS
===================================================== */

.compact-controls{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
    min-width:0;
}

.compact-select{
    width:56px !important;
    min-width:56px;
    padding:7px 8px;
}

.indicator-title-input{
    flex:1;
    min-width:120px !important;
    font-weight:bold;
    font-size:18px;
    color:var(--primary-accent);
}



/* =========================================================
   TEMA CLARO GLOBAL
========================================================= */

.light-theme .sidebar-content,

    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="capa-content"></div>

    <div id="main-display" class="screen-container">
        <h1 id="slide-title">AGUARDANDO DADOS</h1>
        <div class="slide-content"><canvas id="chartCanvas"></canvas></div>
        <div id="average-display" class="stats-footer"></div>
    </div>

    <div id="rule-modal-backdrop"></div>
    <div id="rule-modal">
        <div class="card-header">
            <h3 style="color: var(--primary-accent); margin:0;">🎯 Metas do Indicador</h3>
            <button class="btn btn-remove" onclick="closeRuleModal()">X</button>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="modal-is-sectorized" onchange="updateModalPlaceholder()">
            <label for="modal-is-sectorized">Indicador separado por #SETORES</label>
        </div>
        <p id="modal-hint" style="font-size: 12px; opacity: 0.8; margin-bottom: 10px; font-family: monospace;"></p>
        <textarea id="modal-rules-text" style="height: 150px; margin-bottom: 15px; color: var(--bar-time-color); font-weight: bold; font-family: monospace;"></textarea>
        <input type="hidden" id="modal-indicator-id">
        <button class="btn btn-add" style="margin-bottom:0;" onclick="saveRulesToIndicator()">SALVAR REGRAS</button>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar-settings">
        <div class="sidebar-header">
            <h3>⚙️ Configurações Visuais</h3>
            <button class="btn-icon" onclick="toggleSidebar()">X</button>
        </div>

        <div class="sidebar-section">
            <h4>🖼️ Mídia e Tempo</h4>
            <div style="margin-bottom: 10px;">
                <label style="font-size: 12px; font-weight: bold;">Link Capa Inicial:</label>
                <input type="text" id="cfg-capa-name" placeholder="URL da imagem">
            </div>
            <div style="margin-bottom: 10px;">
                <label style="font-size: 12px; font-weight: bold;">Link Fundo Global:</label>
                <input type="text" id="cfg-fundo-name" placeholder="URL da imagem">
            </div>
            <div>
                <label style="font-size: 12px; font-weight: bold;">Tempo por Tela (Segundos):</label>
                <input type="number" id="cfg-tempo" value="10">
            </div>
        </div>

        <div class="sidebar-section">
            <h4>📏 Layout da Barra</h4>
            <div class="sidebar-grid">
                <div><label>Máx. Barras/Tela:</label><input type="number" id="cfg-bar-qty" value="7"></div>
                <div><label>Espessura (px):</label><input type="number" id="cfg-bar-thick" value="40"></div>
            </div>
        </div>

        <div class="sidebar-section">
            <h4>🔤 Tipografia e Cores</h4>
            <div class="sidebar-grid">
                <div><label>Cor do Título:</label><input type="color" id="cfg-title-color" value="#00ff88"></div>
                <div><label>Tamanho Título:</label><input type="number" id="cfg-title-size" value="42"></div>
                
                <div><label>Cor dos Rótulos:</label><input type="color" id="cfg-label-color" value="#ffffff"></div>
                <div><label>Tamanho Rótulos:</label><input type="number" id="cfg-label-size" value="26"></div>

                <div><label>Cor dos Valores:</label><input type="color" id="cfg-value-color" value="#ffffff"></div>
                <div><label>Tamanho Valores:</label><input type="number" id="cfg-value-size" value="26"></div>
                
                <div><label>Cor Fundo (TV):</label><input type="color" id="cfg-bg-color" value="#0d0d0d"></div>
                <div><label>Cor Timer (TV):</label><input type="color" id="cfg-bar-color" value="#d83b01"></div>

            <input type="checkbox" id="cfg-show-avg" checked> <label for="cfg-show-avg" style="font-weight:bold;">Exibir Média no Rodapé</label> <br>
            <input type="checkbox" id="cfg-show-bar" checked> <label for="cfg-show-bar" style="font-weight:bold;">Exibir Barra de Tempo</label>

                <button class="btn btn-remove" style="width:100%;" onclick="resetSidebarSettings()">

            <div class="header-left">
                <h2>📊 Dashboard</h2>
                <span class="by-lucas">By Lucas G. Oliveira</span>
            </div>

            <div class="header-right">

                <button class="header-btn primary-btn" onclick="salvarEIniciar()">
                    💾
                </button>

                <button class="header-btn primary-btn" onclick="addIndicatorCard()">
                    ➕ 
                </button>

                <button class="header-btn" onclick="toggleSidebar()">
                    ⚙️
                </button>

                <button class="header-btn" onclick="toggleTheme()">
                    🌓
                </button>

                <button class="header-btn" onclick="toggleSetup()">
                    ESC
                </button>

            </div>

        </div>
        
        <div id="indicators-container"></div>
    </div>

<script>
    Chart.register(ChartDataLabels);
    
    let state = { indicators: [], settings: {} };
    let chartInstance = null;
    let timerLoop = null;
    let slidesFinal = [];
    let currentSlideIndex = 0;

    window.onload = () => {
        carregarEstado();
        if (state.indicators.length === 0) {
            addIndicatorCard();
            toggleSetup();
        } else {
            renderizarCardsUI();
            rodarApresentacao();
        }
    };

    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') toggleSetup(); });

    function toggleSetup() {
        const p = document.getElementById('setup-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    /*
    function toggleSidebar() {
        const s = document.getElementById('sidebar-settings');
        const o = document.getElementById('sidebar-overlay');
        const isOpen = s.classList.contains('open');
        if (isOpen) {
            s.classList.remove('open');
            o.style.display = 'none';
        } else {
            s.classList.add('open');
            o.style.display = 'block';
        }
    }
        */
    function syncSidebarToState() {
        const avgCheck = document.getElementById('cfg-show-avg');
        const barCheck = document.getElementById('cfg-show-bar');

        if (avgCheck && barCheck) {
            state.settings.showAvg = avgCheck.checked;
            state.settings.showBar = barCheck.checked;
            console.log("Estado do sidebar sincronizado");
        }
    }

    function toggleSidebar() {
        const s = document.getElementById('sidebar-settings');
        const o = document.getElementById('sidebar-overlay');
        const isOpen = s.classList.contains('open');

    if (isOpen) {
           // --- ADIÇÃO: Sincroniza antes de fechar ---
            const avgCheck = document.getElementById('cfg-show-avg');
            const barCheck = document.getElementById('cfg-show-bar');
        
    if (avgCheck && barCheck) {
          state.settings.showAvg = avgCheck.checked;
          state.settings.showBar = barCheck.checked;
        }
        // ------------------------------------------

            s.classList.remove('open');
            o.style.display = 'none';
        } else {
        // Ao abrir, garante que os checkboxes reflitam o que já está salvo no state
        const avgCheck = document.getElementById('cfg-show-avg');
        const barCheck = document.getElementById('cfg-show-bar');
        
        if (avgCheck && barCheck) {
            avgCheck.checked = state.settings.showAvg;
            barCheck.checked = state.settings.showBar;
        }

        s.classList.add('open');
        o.style.display = 'block';
    }
}

    
    function resetSidebarSettings() {
        document.getElementById('cfg-bg-color').value = '#0d0d0d';
        document.getElementById('cfg-bar-color').value = '#d83b01';
        document.getElementById('cfg-title-color').value = '#00ff88';
        document.getElementById('cfg-label-color').value = '#ffffff';
        document.getElementById('cfg-value-color').value = '#ffffff';

        document.getElementById('cfg-title-size').value = 42;
        document.getElementById('cfg-label-size').value = 26;
        document.getElementById('cfg-value-size').value = 26;

        document.getElementById('cfg-bar-qty').value = 7;
        document.getElementById('cfg-bar-thick').value = 40;
        document.getElementById('cfg-tempo').value = 10;

        document.getElementById('cfg-show-avg').checked = true;
        document.getElementById('cfg-show-bar').checked = true;

        document.getElementById('cfg-capa-name').value = '';
        document.getElementById('cfg-fundo-name').value = '';
    }


    function toggleTheme() {
        const p = document.getElementById('setup-panel');
        p.classList.toggle('light-theme');
        localStorage.setItem('v14_theme', p.classList.contains('light-theme') ? 'light' : 'dark');
    }

    function gerarId() { return 'ind_' + Math.random().toString(36).substr(2, 9); }

    // Sincroniza o que foi digitado na interface com o objeto state antes de reordenar
    function syncInputsToState() {
        state.indicators.forEach(ind => {
            const titleEl = document.getElementById(`title-${ind.id}`);
            const dataEl = document.getElementById(`data-${ind.id}`);
            const chartEl = document.getElementById(`chart-${ind.id}`);

            if(titleEl) ind.title = titleEl.value;
            if(dataEl) ind.rawData = dataEl.value;
            if(chartEl) ind.chartType = chartEl.value;
        });
    }

    function moverCard(id, direcao) {
        syncInputsToState();
        const idx = state.indicators.findIndex(i => i.id === id);
        if (direcao === 'up' && idx > 0) {
            [state.indicators[idx - 1], state.indicators[idx]] = [state.indicators[idx], state.indicators[idx - 1]];
        } else if (direcao === 'down' && idx < state.indicators.length - 1) {
            [state.indicators[idx + 1], state.indicators[idx]] = [state.indicators[idx], state.indicators[idx + 1]];
        }
        renderizarCardsUI();
    }

    function addIndicatorCard(dadosExistentes = null) {
        const id = dadosExistentes ? dadosExistentes.id : gerarId();
        const obj = dadosExistentes || { id: id, title: "", rawData: "", isSectorized: true, rulesText: "", isActive: true, chartType: 'bar' };
        
        // Garante que a propriedade isActive exista em cards legados
        if (obj.isActive === undefined) obj.isActive = true; 

        if (!dadosExistentes) state.indicators.push(obj);

        const container = document.getElementById('indicators-container');
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${id}`;
        
        card.innerHTML = `
            <div class="card-header">
                <div class="card-controls-left">
                    
                    <div class="toggle-eye ${obj.isActive ? 'active' : ''}" id="active-${id}" onclick="toggleIndicatorVisibility('${id}')"></div>
                    <select id="chart-${id}" class="chart-type-select">
                        <option value="bar" ${obj.chartType === 'bar' ? 'selected' : ''}>📊 Barras</option>
                        <option value="column" ${obj.chartType === 'column' ? 'selected' : ''}>📈 Colunas</option>
                    </select>
                    <button class="btn-icon" title="Subir Posição" onclick="moverCard('${id}', 'up')">⬆️</button>
                    <button class="btn-icon" title="Descer Posição" onclick="moverCard('${id}', 'down')">⬇️</button>
                    <button class="btn-icon" title="Regras / Metas" onclick="openRuleModal('${id}')">🎯</button>
                    <button class="btn-icon" title="Excluir Indicador" onclick="removeIndicatorCard('${id}')">🗑️</button>
                    <input type="text" id="title-${id}" placeholder="Ex: % OEE" value="${obj.title}" style="width: 100%; font-weight: bold; font-size: 18px; color: var(--primary-accent);">

                    
                </div>
                
            </div>
            <textarea id="data-${id}" class="data-input" placeholder="Cole os dados aqui...\n\nUse #NOME_DO_SETOR para separar blocos se o indicador for setorizado.\n\nExemplo:\n#FUNDIÇÃO\nMAQUINA 1\t85%\nMAQUINA 2\t92%">${obj.rawData}</textarea>
        `;
        container.appendChild(card);
    }

    
    function toggleIndicatorVisibility(id) {
        const ind = state.indicators.find(i => i.id === id);
        if (!ind) return;

        ind.isActive = !ind.isActive;

        const btn = document.getElementById(`active-${id}`);

        if (ind.isActive) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    }


    function removeIndicatorCard(id) {
        if(!confirm("Remover este indicador?")) return;
        state.indicators = state.indicators.filter(ind => ind.id !== id);
        document.getElementById(`card-${id}`).remove();
    }

    function renderizarCardsUI() {
        document.getElementById('indicators-container').innerHTML = '';
        state.indicators.forEach(ind => addIndicatorCard(ind));
    }

    function openRuleModal(id) {
        const ind = state.indicators.find(i => i.id === id);
        document.getElementById('modal-indicator-id').value = id;
        document.getElementById('modal-is-sectorized').checked = ind.isSectorized;
        document.getElementById('modal-rules-text').value = ind.rulesText;
        updateModalPlaceholder();
        
        document.getElementById('rule-modal').style.display = 'block';
        document.getElementById('rule-modal-backdrop').style.display = 'block';
    }

    function closeRuleModal() {
        document.getElementById('rule-modal').style.display = 'none';
        document.getElementById('rule-modal-backdrop').style.display = 'none';
    }

    function updateModalPlaceholder() {
        const isSector = document.getElementById('modal-is-sectorized').checked;
        const hint = document.getElementById('modal-hint');
        if(isSector) {
            hint.innerText = "Formato: [#SETOR, Verde, Amarelo]\nEx: [#FUNDIÇÃO, 90, 85]";
        } else {
            hint.innerText = "Formato: [Verde, Amarelo]\nEx: [90, 85]";
        }
    }

    function saveRulesToIndicator() {
        const id = document.getElementById('modal-indicator-id').value;
        const ind = state.indicators.find(i => i.id === id);
        ind.isSectorized = document.getElementById('modal-is-sectorized').checked;
        ind.rulesText = document.getElementById('modal-rules-text').value;
        closeRuleModal();
    }

    function carregarEstado() {
        const storeStr = localStorage.getItem('dash_v16_data');
        if (storeStr) {
            const store = JSON.parse(storeStr);
            state.indicators = store.indicators || [];

            // Sincroniza configurações globais corretamente
            state.settings = store.settings || {};
            
            document.getElementById('cfg-bg-color').value = store.settings.bgColor || "#0d0d0d";
            document.getElementById('cfg-bar-color').value = store.settings.barColor || "#d83b01";
            document.getElementById('cfg-title-color').value = store.settings.titleColor || "#00ff88";
            document.getElementById('cfg-label-color').value = store.settings.labelColor || "#ffffff";
            document.getElementById('cfg-value-color').value = store.settings.valueColor || "#ffffff";
            
            document.getElementById('cfg-title-size').value = store.settings.titleSize || 42;
            document.getElementById('cfg-label-size').value = store.settings.labelSize || 26;
            document.getElementById('cfg-value-size').value = store.settings.valueSize || 26;
            
            document.getElementById('cfg-bar-qty').value = store.settings.barQty || 7;
            document.getElementById('cfg-bar-thick').value = store.settings.barThick || 40;
            document.getElementById('cfg-tempo').value = store.settings.tempo || 10;
            document.getElementById('cfg-show-avg').checked = store.settings.showAvg !== false;
            document.getElementById('cfg-show-bar').checked = store.settings.showBar !== false;
            document.getElementById('cfg-capa-name').value = store.settings.capaName || "";
            document.getElementById('cfg-fundo-name').value = store.settings.fundoName || "";
        }
        if (localStorage.getItem('v14_theme') === 'light') document.getElementById('setup-panel').classList.add('light-theme');
    }

    function salvarEIniciar() {
        syncInputsToState(); // Sincroniza indicadores ativos/inativos
        
    // Montamos o objeto de uma vez só, com segurança em cada campo
        const avgEl = document.getElementById('cfg-show-avg');
        const barEl = document.getElementById('cfg-show-bar');

      state.settings = {
        bgColor: document.getElementById('cfg-bg-color').value,
        barColor: document.getElementById('cfg-bar-color').value,
        titleColor: document.getElementById('cfg-title-color').value,
        labelColor: document.getElementById('cfg-label-color').value,
        valueColor: document.getElementById('cfg-value-color').value,
        titleSize: parseInt(document.getElementById('cfg-title-size').value) || 42,
        labelSize: parseInt(document.getElementById('cfg-label-size').value) || 26,
        valueSize: parseInt(document.getElementById('cfg-value-size').value) || 26,
        barQty: parseInt(document.getElementById('cfg-bar-qty').value) || 7,
        barThick: parseInt(document.getElementById('cfg-bar-thick').value) || 40,
        tempo: parseInt(document.getElementById('cfg-tempo').value) || 10,
        
        // AQUI ESTÁ A SEGURANÇA: Se o elemento não existir, mantém o valor atual ou false
        showAvg: avgEl ? avgEl.checked : !!state.settings.showAvg,
        showBar: barEl ? barEl.checked : !!state.settings.showBar,
        
        capaName: document.getElementById('cfg-capa-name').value,
        fundoName: document.getElementById('cfg-fundo-name').value
    };

    // Use uma chave nova para evitar conflito com dados corrompidos de versões antigas
    localStorage.setItem('dash_v16_data', JSON.stringify(state));
    location.reload(); 
    }
    // PARSER CORE
    function parseDados(texto, isSectorized) {
        if (!texto || texto.trim() === "") return [];
        const linhas = texto.split('\n');
        let setores = [];
        let setorAtual = isSectorized ? null : { nome: "GERAL", itens: [] };
        
        if(!isSectorized) setores.push(setorAtual);

        linhas.forEach(l => {
            const linhaLimpa = l.trim();
            if(linhaLimpa === "") return;

            if (isSectorized && linhaLimpa.startsWith('#')) {
                setorAtual = { nome: linhaLimpa.replace('#', '').trim(), itens: [] };
                setores.push(setorAtual);
                return;
            }

            if (setorAtual) {
                let partes = linhaLimpa.split('\t');
                if(partes.length < 2) partes = linhaLimpa.split(/\s{2,}/);

                if(partes.length >= 2) {
                    const nomeStr = partes[0].trim();
                    const matchNumero = partes[1].match(/(\d+)/); 
                    
                    if(matchNumero) {
                        const valorNum = parseInt(matchNumero[1], 10);
                        setorAtual.itens.push({ nome: nomeStr, valor: valorNum });
                    }
                }
            }
        });

        setores.forEach(s => {
            s.itens.sort((a, b) => b.valor - a.valor);
            const soma = s.itens.reduce((acc, curr) => acc + curr.valor, 0);
            s.media = s.itens.length > 0 ? Math.round(soma / s.itens.length) : 0;
        });

        return setores.filter(s => s.itens.length > 0);
    }

    function parseMetas(rulesText, isSectorized, nomeSetor) {
        const metasPadrao = { verde: 90, amarelo: 80 };
        if (!rulesText) return metasPadrao;

        const linhas = rulesText.split('\n');
        for (let l of linhas) {
            const texto = l.trim();
            if (!texto.startsWith('[')) continue;
            
            const inner = texto.substring(1, texto.indexOf(']'));
            if(!inner) continue;

            const partes = inner.split(',').map(p => p.trim().toUpperCase());
            
            if (isSectorized) {
                if (partes.length >= 3 && partes[0] === `#${nomeSetor.toUpperCase()}`) {
                    return { verde: parseInt(partes[1]), amarelo: parseInt(partes[2]) };
                }
            } else {
                if (partes.length >= 2) {
                    return { verde: parseInt(partes[0]), amarelo: parseInt(partes[1]) };
                }
            }
        }
        return metasPadrao;
    }

    function rodarApresentacao() {
        // Filtra apenas os cards que estão ativos pelo Checkbox
        const activeIndicators = state.indicators.filter(ind => ind.isActive !== false);

        if(activeIndicators.length === 0) {
            document.getElementById('slide-title').innerText = "NENHUM INDICADOR ATIVO";
            return;
        }

        document.documentElement.style.setProperty('--bar-time-color', state.settings.barColor || '#d83b01');
        document.body.style.backgroundColor = state.settings.bgColor || '#0d0d0d';
        if (state.settings.fundoName) {
            document.body.style.backgroundImage = `url("${state.settings.fundoName}")`;
        } else {
            document.body.style.backgroundImage = 'none';
        }

        slidesFinal = [];
        
        if (state.settings.capaName) {
            slidesFinal.push({ tipo: 'CAPA', img: state.settings.capaName });
        }

        activeIndicators.forEach(ind => {
            const setoresProcessados = parseDados(ind.rawData, ind.isSectorized);
            
            setoresProcessados.forEach(setor => {
                const metas = parseMetas(ind.rulesText, ind.isSectorized, setor.nome);
                const barQty = state.settings.barQty || 7;
                const qtdTelas = (ind.chartType === 'column')
                    ? 1
                    : Math.ceil(setor.itens.length / barQty);
                
                for (let i = 0; i < qtdTelas; i++) {
                    const fatia = ind.chartType === 'column'
                        ? setor.itens
                        : setor.itens.slice(i * barQty, (i + 1) * barQty);
                    let tituloSlide = ind.title;
                    if(ind.isSectorized) tituloSlide += ` - ${setor.nome}`;
                    
                    slidesFinal.push({
                        tipo: 'DADO',
                        titulo: tituloSlide,
                        labels: fatia.map(it => it.nome),
                        valores: fatia.map(it => it.valor),
                        media: setor.media,
                        metas: metas,
                        paginacao: qtdTelas > 1 ? `(${i + 1}/${qtdTelas})` : '',
                        chartType: ind.chartType || 'bar'
                    });
                }
            });
        });

        if (slidesFinal.length > 0) {
            iniciarLoop();
        } else {
            document.getElementById('slide-title').innerText = "NENHUM DADO PROCESSÁVEL ENCONTRADO";
        }
    }

    function obterCorPorMeta(valor, metas) {
        if (valor >= metas.verde) return '#00ff88';
        if (valor >= metas.amarelo) return '#ffcc00';
        return '#ff4d4d';
    }

    function iniciarLoop() {
        const tempoMs = (state.settings.tempo || 10) * 1000;
        
        const renderizarSlideAtual = () => {
            const slide = slidesFinal[currentSlideIndex % slidesFinal.length];
            const capaWrap = document.getElementById('capa-content');
            const mainWrap = document.getElementById('main-display');
            const avgDisplay = document.getElementById('average-display');
            const progCont = document.getElementById('progress-container');
            const progBar = document.getElementById('progress-bar');
            
            if (state.settings.showBar !== false) {
                progCont.style.display = 'block';
                progBar.style.transition = 'none'; 
                progBar.style.width = '0%';
                void progBar.offsetWidth; 
                progBar.style.transition = `width ${tempoMs}ms linear`; 
                progBar.style.width = '100%';
            } else {
                progCont.style.display = 'none';
            }

            if (slide.tipo === 'CAPA') {
                mainWrap.style.opacity = '0';
                setTimeout(() => {
                    mainWrap.style.display = 'none'; 
                    capaWrap.style.display = 'block';
                    capaWrap.style.backgroundImage = `url("${slide.img}")`;
                }, 300);
            } else {
                capaWrap.style.display = 'none'; 
                mainWrap.style.display = 'flex';
                mainWrap.style.opacity = '1';

                const titleEl = document.getElementById('slide-title');
                titleEl.style.color = state.settings.titleColor || '#00ff88';
                titleEl.style.fontSize = (state.settings.titleSize || 42) + 'px';
                titleEl.innerHTML = `${slide.titulo} <span style="opacity:0.4; font-size:0.6em;">${slide.paginacao}</span>`;
                
                if (state.settings.showAvg !== false && slide.media > 0) {
                    avgDisplay.style.display = 'block'; 
                    avgDisplay.innerText = `MÉDIA: ${slide.media}%`;
                    avgDisplay.style.color = obterCorPorMeta(slide.media, slide.metas);
                } else {
                    avgDisplay.style.display = 'none';
                }

                if (chartInstance) {
                    chartInstance.destroy();
                }

                const ctx = document.getElementById('chartCanvas').getContext('2d');
                const maxEscala = Math.max(100, ...slide.valores);
                
                const labelColor = state.settings.labelColor || '#ffffff';
                const labelSize = state.settings.labelSize || 26;
                const valueColor = state.settings.valueColor || '#ffffff';
                const valueSize = state.settings.valueSize || 26;

                chartInstance = new Chart(ctx, {
                    type: 'bar', 
                    data: {
                        labels: slide.labels, 
                        datasets: [{
                            data: slide.valores, 
                            backgroundColor: slide.valores.map(v => obterCorPorMeta(v, slide.metas)),
                            borderRadius: 6, 
                            barThickness: state.settings.barThick || 40
                        }]
                    },
                    options: {
                        indexAxis: slide.chartType === 'column' ? 'x' : 'y', 
                        responsive: true, 
                        maintainAspectRatio: false,
                        animation: { duration: 800, easing: 'easeOutQuart' },
                        plugins: { 
                            legend: { display: false }, 
                            datalabels: slide.chartType === 'column'
                            ? {
                                anchor: 'end',
                                align: 'top',
                                offset: -4,
                                color: valueColor,
                                font: {
                                    size: valueSize,
                                    weight: 'bold',
                                    family: 'Segoe UI'
                                },
                                formatter: v => v + '%'
                            }
                            : {
                                anchor: 'end',
                                align: 'right',
                                color: valueColor,
                                font: {
                                    size: valueSize,
                                    weight: 'bold',
                                    family: 'Segoe UI'
                                },
                                formatter: v => v + '%'
                            }
                        },
                        scales: slide.chartType === 'column'
                        ? {
                            x: {
                                grid: { display: false, drawBorder: false },
                                ticks: {
                                    color: labelColor,
                                    font: { size: labelSize - 4, weight: 'bold' },
                                    callback: function(value) {
                                        const label = this.getLabelForValue(value);
                                        return label.split(' ');
                                    }
                                }
                            },
                            y: {
                                display: false,
                                grid: { display: false, drawBorder: false }
                            }
                        }
                        : {
                            x: { max: maxEscala + 15, display: false },
                            y: {
                                grid: { display: false, drawBorder: false },
                                ticks: {
                                    color: labelColor,
                                    font: { size: labelSize, weight: 'bold' },
                                    padding: 15
                                }
                            }
                        }
                    }
                });
            }
            
            currentSlideIndex++;
        };

        renderizarSlideAtual();
        if(timerLoop) clearInterval(timerLoop);
        timerLoop = setInterval(renderizarSlideAtual, tempoMs);
    }
</script>
